syntax = "proto3";

package wallet;

service WalletService {
  rpc CreateWallet (CreateWalletRequest) returns (WalletResponse) {}
  rpc GetWallet (GetWalletRequest) returns (WalletResponse) {}
  rpc CreditWallet (CreditWalletRequest) returns (WalletResponse) {}
  rpc DebitWallet (DebitWalletRequest) returns (WalletResponse) {}
  rpc GetTransactions (GetTransactionsRequest) returns (TransactionsResponse) {}
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse) {}
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
  string database = 2;
}

message CreateWalletRequest {
  string userId = 1;
}

message GetWalletRequest {
  string userId = 1;
}

message CreditWalletRequest {
  string userId = 1;
  double amount = 2;
  string idempotencyKey = 3;
}

message DebitWalletRequest {
  string userId = 1;
  double amount = 2;
  string idempotencyKey = 3;
}

message GetTransactionsRequest {
  string userId = 1;
}

message Transaction {
  string id = 1;
  string type = 2;
  double amount = 3;
  string createdAt = 4;
}

message TransactionsResponse {
  repeated Transaction transactions = 1;
}

message WalletResponse {
  string id = 1;
  string userId = 2;
  double balance = 3;
  string createdAt = 4;
}
